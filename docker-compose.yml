services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-reorch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reorch}
      POSTGRES_DB: ${DB_NAME:-reorch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reorch} -d ${DB_NAME:-reorch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  mock-integration:
    build: .
    command: ["uvicorn", "app.adapters.mock_server:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      INTEGRATION_MES_BASE_URL: http://mock-integration:8010
      INTEGRATION_MES_WRITEBACK_PATH: /api/schedule/writeback
      INTEGRATION_ERP_APS_BASE_URL: http://mock-integration:8010
      INTEGRATION_ERP_APS_SNAPSHOT_PATH: /api/schedule/snapshot
      INTEGRATION_ERP_APS_RESOURCES_PATH: /api/resources
      INTEGRATION_ERP_APS_WORK_ORDERS_PATH: /api/work-orders
      INTEGRATION_IOT_BASE_URL: http://mock-integration:8010
      INTEGRATION_IOT_EVENTS_PATH: /api/incidents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
      mock-integration:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build: .
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      backend:
        condition: service_started
    command: ["python", "-m", "app.core.worker_entrypoint"]

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
