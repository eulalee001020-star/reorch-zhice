name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run backend tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start Compose stack
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/healthz; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs backend
          exit 1

      - name: Check backend readiness
        run: curl -fsS http://localhost:8000/readyz

      - name: Check integration health
        run: curl -fsS http://localhost:8000/api/v1/health/integrations

      - name: Check frontend
        run: curl -fsS http://localhost:3000

      - name: Check for exited services
        run: |
          exited="$(docker compose ps --services --filter status=exited)"
          if [ -n "$exited" ]; then
            echo "Exited services: $exited"
            docker compose logs $exited
            exit 1
          fi

      - name: Show Compose status
        if: always()
        run: docker compose ps

      - name: Show logs
        if: always()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
