[alembic]
script_location = alembic
prepend_sys_path = .

# The URL is overridden at runtime by env.py using app settings.
# This fallback is only used when running alembic CLI directly.
sqlalchemy.url = postgresql://reorch:reorch@localhost:5432/reorch

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
